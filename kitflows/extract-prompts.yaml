name: extract-prompts
description: >
  Pulls a set of modelkits and extracts their prompt layers into a single
  local directory, namespaced by source modelkit.
  Useful for auditing prompts across a model family, centralizing them for
  review, or reusing them in a new modelkit.

vars:
  modelkit_a: ""          # required — e.g. jozu.ml/myorg/assistant-v1:latest
  modelkit_b: ""          # required — e.g. jozu.ml/myorg/assistant-v2:latest
  modelkit_c: ""          # required — e.g. jozu.ml/myorg/assistant-v3:latest
  output_dir: ./collected-prompts

steps:

  # ── 1. Pull all modelkits ─────────────────────────────────────────────────

  - name: Pull modelkit A
    kit.pull:
      ref: ${modelkit_a}

  - name: Pull modelkit B
    kit.pull:
      ref: ${modelkit_b}

  - name: Pull modelkit C
    kit.pull:
      ref: ${modelkit_c}

  # ── 2. Unpack only the prompts layer from each ────────────────────────────
  # Extracting a single layer avoids pulling large model weights to disk.

  - name: Unpack prompts from modelkit A
    kit.unpack:
      ref: ${modelkit_a}
      dir: ./workspace/a
      filter:
        - prompts

  - name: Unpack prompts from modelkit B
    kit.unpack:
      ref: ${modelkit_b}
      dir: ./workspace/b
      filter:
        - prompts

  - name: Unpack prompts from modelkit C
    kit.unpack:
      ref: ${modelkit_c}
      dir: ./workspace/c
      filter:
        - prompts

  # ── 3. Collect into output directory, namespaced by source ───────────────

  - name: Collect prompts from modelkit A
    copy:
      from: ./workspace/a/
      to: ${output_dir}/modelkit-a/

  - name: Collect prompts from modelkit B
    copy:
      from: ./workspace/b/
      to: ${output_dir}/modelkit-b/

  - name: Collect prompts from modelkit C
    copy:
      from: ./workspace/c/
      to: ${output_dir}/modelkit-c/
