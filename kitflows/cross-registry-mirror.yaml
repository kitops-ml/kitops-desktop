name: cross-registry-mirror
description: >
  Pulls a modelkit from one registry and pushes it to another.
  Useful for migrating models between environments (dev → staging → prod)
  or syncing to an air-gapped / private registry.

vars:
  source_ref: ""      # required — e.g. jozu.ml/myorg/my-model:v1.0
  target_ref: ""      # required — e.g. registry.internal/myorg/my-model:v1.0
  plain_http: false   # set to true for plain HTTP (non-TLS) registries
  tls_verify: true    # set to false to skip TLS verification (self-signed certs)
  remove_source: true # set to false to keep the source modelkit locally after push

steps:

  - name: Pull from source registry
    kit.pull:
      args: ${source_ref}
      plain-http: ${plain_http}
      tls-verify: ${tls_verify}

  - name: Tag for target registry
    kit.tag:
      args:
        - ${source_ref}
        - ${target_ref}

  - name: Inspect before pushing
    kit.info:
      args: ${target_ref}

  - name: Push to target registry
    kit.push:
      args: ${target_ref}
      plain-http: ${plain_http}
      tls-verify: ${tls_verify}

  - name: Clean up source modelkit
    when: ${remove_source}
    kit.remove:
      args: ${source_ref}
