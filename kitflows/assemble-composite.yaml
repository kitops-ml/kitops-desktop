name: assemble-composite
description: >
  Assembles a new modelkit by combining components from three separate sources:
  a base model, a curated prompts collection, and an evaluation dataset.
  Each component is owned by a different team and lives in its own registry.
  The result is a single production-ready modelkit pushed to a target registry.

  This pattern is useful when model weights, prompt engineering, and dataset
  curation are done by separate teams — each publishing their own modelkit —
  and a release engineer needs to assemble a versioned production artifact.

vars:
  base_model_ref: ""      # required — e.g. jozu.ml/ml-team/base-llm:v2.1
  prompts_ref: ""         # required — e.g. jozu.ml/prompt-team/system-prompts:v1.4
  dataset_ref: ""         # required — e.g. jozu.ml/data-team/eval-dataset:v3.0
  output_ref: ""          # required — e.g. jozu.ml/releases/production-llm
  output_tag: latest
  description: "Production modelkit assembled from multiple sources."

steps:

  # ── 1. Pull all source modelkits ──────────────────────────────────────────

  - name: Pull base model
    kit.pull:
      ref: ${base_model_ref}

  - name: Pull prompts collection
    kit.pull:
      ref: ${prompts_ref}

  - name: Pull evaluation dataset
    kit.pull:
      ref: ${dataset_ref}

  # ── 2. Unpack each into an isolated workspace directory ───────────────────
  # Using `layers` to unpack only the relevant layer from each modelkit,
  # avoiding unnecessary extraction of large files we won't use.

  - name: Unpack model weights
    kit.unpack:
      ref: ${base_model_ref}
      dir: ./workspace/base-model
      filter:
        - model

  - name: Unpack prompts
    kit.unpack:
      ref: ${prompts_ref}
      dir: ./workspace/prompts
      filter:
        - prompts

  - name: Unpack evaluation dataset
    kit.unpack:
      ref: ${dataset_ref}
      dir: ./workspace/dataset
      filter:
        - datasets

  # ── 3. Collect author credits ─────────────────────────────────────────────
  # Reads package.authors from each source Kitfile and merges them into a single
  # variable. The Kitfile is always present after unpack regardless of layer filters.
  # Sources where the field is missing or empty are skipped — the merge is a
  # best-effort union. Duplicates are automatically deduplicated.

  - name: Collect author credits
    read:
      format: yaml
      source:
        - ./workspace/base-model/Kitfile
        - ./workspace/prompts/Kitfile
        - ./workspace/dataset/Kitfile
      merge:
        all_authors: package.authors

  # ── 4. Stage into output directory ────────────────────────────────────────
  # Using `move` instead of `copy` so the workspace is consumed in the process
  # — no separate cleanup step needed.

  - name: Stage model weights
    move:
      from: ./workspace/base-model/model/
      to: ./output/model/

  - name: Stage prompts
    move:
      from: ./workspace/prompts/prompts/
      to: ./output/prompts/

  - name: Stage evaluation dataset
    move:
      from: ./workspace/dataset/data/
      to: ./output/data/eval/

  # ── 5. Initialize Kitfile ─────────────────────────────────────────────────
  # kit init reads ./output and generates a Kitfile from the directory structure.
  # Authors collected from all source Kitfiles are passed so every contributor
  # gets credit. Duplicates are already deduplicated by the kitfile.read step.

  - name: Initialize Kitfile
    kit.init:
      args: ./output
      author: ${all_authors}
      desc: ${description}

  # ── 6. Pack and push ──────────────────────────────────────────────────────

  - name: Pack composite modelkit
    kit.pack:
      args: ./output
      tag: ${output_ref}:${output_tag}

  - name: Inspect before pushing
    kit.info:
      ref: ${output_ref}:${output_tag}

  - name: Push composite modelkit
    kit.push:
      ref: ${output_ref}:${output_tag}
