name: compare-versions
description: >
  Pulls two versions of the same modelkit side by side, reads key metadata
  from each Kitfile, runs a structural diff, and writes a markdown comparison
  report to disk. Useful for release audits, PR reviews, or understanding what
  drifted between two published artifacts.

vars:
  ref_a: ""                  # required — e.g. jozu.ml/myorg/my-model:v1.0
  ref_b: ""                  # required — e.g. jozu.ml/myorg/my-model:v2.0
  output_dir: ./comparison

steps:

  # ── 1. Pull both modelkits ────────────────────────────────────────────────

  - name: Pull version A
    kit.pull:
      args: ${ref_a}

  - name: Pull version B
    kit.pull:
      args: ${ref_b}

  # ── 2. Unpack Kitfiles ────────────────────────────────────────────────────
  # The Kitfile is always extracted regardless of layer filters, so we skip
  # providing a filter here — we just want the metadata, not the heavy blobs.

  - name: Unpack Kitfile from A
    kit.unpack:
      args: ${ref_a}
      dir: ./workspace/a

  - name: Unpack Kitfile from B
    kit.unpack:
      args: ${ref_b}
      dir: ./workspace/b

  # ── 3. Read metadata from each Kitfile ────────────────────────────────────

  - name: Read metadata from A
    read:
      format: yaml
      source: ./workspace/a/Kitfile
      into:
        name_a: package.name
        version_a: package.version
        description_a: package.description

  - name: Read metadata from B
    read:
      format: yaml
      source: ./workspace/b/Kitfile
      into:
        name_b: package.name
        version_b: package.version
        description_b: package.description

  # ── 4. Diff layer structure ───────────────────────────────────────────────
  # kit diff exits non-zero when the artifacts diverge — the flow stops here
  # if the two refs are structurally incompatible.

  - name: Diff A vs B
    kit.diff:
      args:
        - ${ref_a}
        - ${ref_b}

  # ── 5. Write comparison report ────────────────────────────────────────────

  - name: Write comparison report
    write:
      path: ${output_dir}/report.md
      content: |
        # ModelKit Comparison Report

        | Field       | A                   | B                   |
        |-------------|---------------------|---------------------|
        | Reference   | ${ref_a}            | ${ref_b}            |
        | Name        | ${name_a}           | ${name_b}           |
        | Version     | ${version_a}        | ${version_b}        |
        | Description | ${description_a}    | ${description_b}    |

        See the **Diff A vs B** step output above for a full layer-by-layer breakdown.

        ---
        *Generated by kitflow compare-versions.*
