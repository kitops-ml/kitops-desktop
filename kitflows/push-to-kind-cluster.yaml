name: Push ModelKit to the Kind Cluster Registry
description: >
  Pull, tag and push a given ModelKit reference to `registry.kind.cluster`
  in the test-user account

vars:
  source_ref: '' # required - repository to pull, eg. jozu.ml/account/repo:tag

steps:

  - name: Pull the source
    kit.pull:
      path: ${source_ref}

  - name: Tag for kind cluster
    kit.tag:
      source: ${source_ref}
      destination: registry.kind.cluster/test-user/${source_ref | strip-tag | after '/'}:${source_ref | tag}

  - name: Login to registry.kind.cluster
    kit.login:
      registry: registry.kind.cluster
      username: test-user
      password: test
      tlsVerify: false

  - name: Push to registry.kind.cluster
    kit.push:
      source: registry.kind.cluster/test-user/${source_ref | strip-tag | after '/'}:${source_ref | tag}
      tlsVerify: false

  - name: Delete the source from the local store
    kit.remove:
      path: ${source_ref}
      force: true
