name: generate-release-notes
description: >
  Automates the pre-release documentation ritual: pulls two versions, reads
  key metadata from each Kitfile, diffs the layer structure, and writes a
  pre-populated RELEASE-NOTES.md template ready to fill in.
  Replaces the manual pull → diff → copy-paste routine before every release.

vars:
  previous_ref: ""              # required — e.g. jozu.ml/myorg/my-model:v1.9
  new_ref: ""                   # required — e.g. jozu.ml/myorg/my-model:v2.0

steps:

  # ── 1. Pull both versions ─────────────────────────────────────────────────

  - name: Pull previous version
    kit.pull:
      args: ${previous_ref}

  - name: Pull new version
    kit.pull:
      args: ${new_ref}

  # ── 2. Unpack Kitfiles ────────────────────────────────────────────────────

  - name: Unpack previous Kitfile
    kit.unpack:
      args: ${previous_ref}
      dir: ./workspace/prev
      overwrite: true

  - name: Unpack new Kitfile
    kit.unpack:
      args: ${new_ref}
      dir: ./workspace/next
      overwrite: true

  # ── 3. Read metadata from each Kitfile ────────────────────────────────────

  - name: Read previous version metadata
    read:
      format: yaml
      source: ./workspace/prev/Kitfile
      into:
        prev_version: package.version
        prev_description: package.description

  - name: Read new version metadata
    read:
      format: yaml
      source: ./workspace/next/Kitfile
      into:
        next_version: package.version
        next_description: package.description

  # ── 4. Diff ───────────────────────────────────────────────────────────────
  # The diff output is captured in the step log — review it before filling
  # in the "What changed" section of the template below.

  - name: Diff layers
    kit.diff:
      args:
        - ${previous_ref}
        - ${new_ref}

  # ── 5. Write release notes template ──────────────────────────────────────
  # The template is pre-populated with version metadata and the pull command.
  # Fill in the "What changed" section manually after reviewing the diff above.

  - name: Write release notes template
    echo: |
        # Release Notes — ${next_version}

        **Promoted from:** ${prev_version}
        **Reference:** ${new_ref}

        ## Description

        ${next_description}

        ## What changed

        > TODO: summarize the layer changes from the diff step output above.

        ## How to pull

        ```sh
        kit pull ${new_ref}
        ```

        ---
        *Draft generated by kitflow generate-release-notes.*
