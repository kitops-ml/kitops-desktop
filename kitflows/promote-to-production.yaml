name: promote-to-production
description: >
  Promotes a modelkit from a staging registry to production.
  Pulls the release candidate from staging, inspects it, diffs it against the
  currently-live production version to confirm the delta is expected, retags
  for prod, and pushes. Designed to be invoked non-interactively from a
  CI/CD pipeline using --flag=value arguments.

  Set remove_staging to false to keep the staging copy locally after promotion.

vars:
  staging_ref: ""       # required — e.g. registry.staging/myorg/my-model:rc-47
  current_prod_ref: ""  # required — e.g. jozu.ml/myorg/my-model:latest (diff baseline)
  prod_ref: ""          # required — e.g. jozu.ml/myorg/my-model:v2.0 (new prod tag)
  prod_registry: ""     # required — e.g. jozu.ml
  prod_username: ""     # required
  prod_password: ""     # required
  remove_staging: "true"

steps:

  # ── 1. Authenticate ───────────────────────────────────────────────────────
  # Credentials are supplied via variables — never hard-code them in the file.
  # In CI, pass them with --prod_username=$REGISTRY_USER --prod_password=$REGISTRY_PASS

  - name: Login to production registry
    kit.login:
      args: ${prod_registry}
      username: ${prod_username}
      password: ${prod_password}

  # ── 2. Pull candidate and current prod ───────────────────────────────────

  - name: Pull staging candidate
    kit.pull:
      args: ${staging_ref}

  - name: Pull current production modelkit
    kit.pull:
      args: ${current_prod_ref}

  # ── 3. Gate: inspect + diff ───────────────────────────────────────────────
  # kit info gives a layer-size summary useful to have in CI logs.
  # kit diff exits non-zero on unexpected structural divergence — if layers
  # appear or disappear unexpectedly the flow stops before anything is promoted.

  - name: Inspect candidate
    kit.info:
      args: ${staging_ref}

  - name: Diff candidate against current production
    kit.diff:
      args:
        - ${current_prod_ref}
        - ${staging_ref}

  # ── 4. Promote ────────────────────────────────────────────────────────────

  - name: Tag for production
    kit.tag:
      args:
        - ${staging_ref}
        - ${prod_ref}

  - name: Push to production registry
    kit.push:
      args: ${prod_ref}

  # ── 5. Cleanup ────────────────────────────────────────────────────────────

  - name: Remove staging copy
    when: ${remove_staging}
    kit.remove:
      args: ${staging_ref}
